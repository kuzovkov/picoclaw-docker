Section "Device"
    Identifier "DummyDevice"
    Driver "dummy"
    VideoRam 256000
EndSection

Section "Monitor"
    Identifier "Monitor0"
    HorizSync 28-80
    VertRefresh 48-75
EndSection

Section "Screen"
    Identifier "Screen0"
    Device "DummyDevice"
    Monitor "Monitor0"

    DefaultDepth 24

    SubSection "Display"
        Depth 24
        Modes "1920x1080"
    EndSubSection
EndSection

Section "ServerLayout"
    Identifier "Layout0"
    Screen "Screen0"
EndSection

